<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜優愛介護キャリアパートナーズ</title>
<style>
body{font-family:sans-serif;margin:0;line-height:1.8;color:#333}
header{background:#004d40;color:white;padding:40px;text-align:center}
section{max-width:700px;margin:auto;padding:40px 20px}
label{display:block;margin-top:20px;font-weight:bold}
input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}
button{
margin-top:20px;
padding:12px 20px;
background:#004d40;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
footer{background:#263238;color:white;text-align:center;padding:20px;margin-top:40px}
</style>
</head>
<body>

<header>
<h1>お問い合わせ</h1>
</header>

<section>

<form>
<label>お問い合わせ種別</label>
<select>
<option>介護施設・事業所さま</option>
<option>お仕事をお探しの方</option>
</select>

<label>お名前</label>
<input type="text" placeholder="山田 太郎">

<label>電話番号</label>
<input type="tel" placeholder="090-1234-5678">

<label>メールアドレス</label>
<input type="email" placeholder="example@email.com">

<label>お問い合わせ内容</label>
<textarea rows="5" placeholder="ご相談内容をご記入ください"></textarea>

<label>
<input type="checkbox"> 個人情報の取り扱いに同意します
</label>

<button type="submit">送信する</button>
</form>

<p style="margin-top:30px;">
<a href="index.html">トップへ戻る</a>
</p>

</section>

<footer>
<p>株式会社優愛｜優愛介護キャリアパートナーズ</p>
</footer>

</body>
</html>
